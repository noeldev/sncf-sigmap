[build]
  publish = "."
  # Generates js/config.local.js from the JAWG_API_KEY environment variable.
  # Set that variable in: Netlify dashboard → Site → Project configuration → Environment variables.
  command = """
    echo "export const JAWG_API_KEY = '$JAWG_API_KEY';" > js/config.local.js
  """

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    
[[headers]]
  for = "/css/*"
  [headers.values]
    # no-cache: browser revalidates on each load (304 if unchanged, fast).
    Cache-Control = "no-cache"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache"

# Tile files are stored as .json.gz on disk.
# JS requests .json — Netlify rewrites to .json.gz and adds decompression headers
# so fetch().json() works transparently, identical to Caddy local dev.
[[redirects]]
  from = "/data/tiles/*.json"
  to   = "/data/tiles/:splat.json.gz"
  status = 200

[[headers]]
  for = "/data/tiles/*.json.gz"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type = "application/json"
    Content-Encoding = "gzip"
    Access-Control-Allow-Origin = "*"
