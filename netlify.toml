[build]
  publish = "."

# HTML: never cache
[[headers]]
  for = "/*.html"
  [headers.values]
  Cache-Control = "no-cache"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  # Required for Web Workers with ES modules on some browsers
  Cross-Origin-Opener-Policy = "same-origin"
  Cross-Origin-Embedder-Policy = "require-corp"

# JS and CSS: cache indefinitely (filenames are stable)
[[headers]]
  for = "/css/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
  Cross-Origin-Resource-Policy = "cross-origin"

# GeoJSON data: cache for 24 hours, allow cross-origin fetch from the worker
[[headers]]
  for = "/data/*"
  [headers.values]
  Cache-Control = "public, max-age=86400"
  Access-Control-Allow-Origin = "*"
  Cross-Origin-Resource-Policy = "cross-origin"
