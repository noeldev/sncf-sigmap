[build]
  publish = "."

[[headers]]
  for = "/*.html"
  [headers.values]
  Cache-Control = "no-cache"
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/css/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

# Tile files: served as gzip-encoded JSON so fetch().json() decompresses automatically
[[headers]]
  for = "/data/tiles/*.json.gz"
  [headers.values]
  Cache-Control = "public, max-age=86400"
  Content-Type = "application/json"
  Content-Encoding = "gzip"
  Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/data/tiles/*.json"
  [headers.values]
  Cache-Control = "public, max-age=86400"
  Content-Type = "application/json"
  Access-Control-Allow-Origin = "*"
