<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SNCF Permanent Signalling map viewer.">
  <meta name="robots" content="noindex, nofollow">
  <title>SNCF – Permanent Signalling</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png"     href="favicon.png" sizes="32x32">
  <link rel="apple-touch-icon"          href="favicon.png">

  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="logo">
        <img src="signal-avl.svg" alt="Signal A-VL" class="logo-signal">
        <div>
          <div class="logo-badge">SNCF</div>
          <h1>Permanent Signalling</h1>
        </div>
      </div>
      <div id="record-count">Loading…</div>
    </div>

    <div id="filters-section">
      <div class="filters-header">
        <span class="filters-title-text">Filters</span>
        <div class="filters-actions">
          <button class="btn-add-filter" id="btn-add-filter">+ Add</button>
          <button class="btn-reset"       id="btn-reset-filters">Reset</button>
        </div>
      </div>
      <div id="filters-container"></div>
    </div>
  </aside>

  <div id="map-container">
    <div id="map"></div>
    <div id="basemap-selector"></div>

    <!-- Zoom hint overlay -->
    <div id="zoom-hint" class="hidden">
      🔍 Zoom in to see signals (level 11+)
    </div>

    <button id="btn-geolocate" title="Centre map on my location">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        <circle cx="12" cy="12" r="8" stroke-dasharray="3 3" opacity=".5"/>
      </svg>
    </button>

    <div id="progress-overlay" class="hidden">
      <div class="progress-spinner"></div>
      <div id="progress-msg">Loading…</div>
    </div>

    <div id="statusbar">
      <span class="sb-item">Visible: <span class="sb-val" id="st-visible">0</span></span>
      <span class="sb-sep">|</span>
      <span class="sb-item">Active filters: <span class="sb-val" id="st-filters">0</span></span>
    </div>
  </div>

</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
