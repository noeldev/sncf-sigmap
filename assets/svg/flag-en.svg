<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7410 3900">
  <!-- 13 alternating stripes -->
  <rect width="7410" height="3900" fill="#B22234"/>
  <rect y="300" width="7410" height="300" fill="#fff"/>
  <rect y="900" width="7410" height="300" fill="#fff"/>
  <rect y="1500" width="7410" height="300" fill="#fff"/>
  <rect y="2100" width="7410" height="300" fill="#fff"/>
  <rect y="2700" width="7410" height="300" fill="#fff"/>
  <rect y="3300" width="7410" height="300" fill="#fff"/>
  <!-- Blue canton -->
  <rect width="2964" height="2100" fill="#3C3B6E"/>
  <!-- Stars: 9 rows of 11/6 alternating, simplified as white dots at small size -->
  <g fill="#fff">
    <g id="col-a">
      <!-- 6 stars at x=247, rows 0,2,4,6,8 (y=105,525,945,1365,1785) -->
      <circle cx="247"  cy="105"  r="95"/>
      <circle cx="247"  cy="525"  r="95"/>
      <circle cx="247"  cy="945"  r="95"/>
      <circle cx="247"  cy="1365" r="95"/>
      <circle cx="247"  cy="1785" r="95"/>
    </g>
    <g id="col-b">
      <!-- 5 stars at x=494, rows 1,3,5,7 (y=315,735,1155,1575,1995) -->
      <circle cx="494"  cy="315"  r="95"/>
      <circle cx="494"  cy="735"  r="95"/>
      <circle cx="494"  cy="1155" r="95"/>
      <circle cx="494"  cy="1575" r="95"/>
      <circle cx="494"  cy="1995" r="95"/>
    </g>
    <use href="#col-a" transform="translate(988,0)"/>
    <use href="#col-b" transform="translate(988,0)"/>
    <use href="#col-a" transform="translate(1976,0)"/>
    <use href="#col-b" transform="translate(1976,0)"/>
    <use href="#col-a" transform="translate(2470,0)"/>
  </g>
</svg>
