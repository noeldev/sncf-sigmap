<?xml version="1.0" encoding="UTF-8"?>
<!-- SNCF Signal A-VL (Avertissement - Voie Libre) — square favicon variant -->
<svg version="1.1" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background square -->
  <rect width="100" height="100" rx="16" ry="16" fill="#0b0e16"/>
  <!-- Signal body (rounded rect, portrait, centred) -->
  <rect x="28" y="5" width="44" height="78" rx="22" ry="22" fill="#111"/>
  <!-- White border on signal body -->
  <rect x="31" y="8" width="38" height="72" rx="19" ry="19" fill="none" stroke="#fff" stroke-width="2.5"/>
  <!-- Green light (Voie Libre) -->
  <circle cx="50" cy="30" r="11" fill="#00ff00"/>
  <!-- Orange/yellow light (Avertissement) — off -->
  <circle cx="50" cy="55" r="8" fill="#333"/>
  <!-- Mast -->
  <rect x="47" y="83" width="6" height="12" rx="2" fill="#4a5878"/>
  <!-- Base -->
  <rect x="38" y="93" width="24" height="5" rx="2" fill="#4a5878"/>
</svg>
